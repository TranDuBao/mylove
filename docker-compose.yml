version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: love_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - love_network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: love_backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/love_db
      - JWT_SECRET=super_secret_romantic_key_change_me
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongodb
    networks:
      - love_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: love_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - love_network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  love_network:
    driver: bridge
